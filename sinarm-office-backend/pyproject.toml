[tool.black]
line-length = 88
target-version = ["py313"]

[tool.ruff]
line-length = 88
target-version = "py313"
src = ["apps", "config", "tests"]

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "B",
    "UP",
    "DJ",
]
ignore = [
    "DJ001",
]

[tool.mypy]
python_version = "3.13"
plugins = ["mypy_django_plugin.main"]
strict = true
ignore_missing_imports = true
cache_dir = "../.cache/mypy"
exclude = [
    "migrations",
]

[tool.django-stubs]
django_settings_module = "config.settings.dev"
