name: Backend CI

on:
  push:
    paths:
      - "sinarm-office-backend/**"
      - "requirements/**"
      - ".github/workflows/backend-ci.yml"
      - "pyproject.toml"
  pull_request:
    paths:
      - "sinarm-office-backend/**"
      - "requirements/**"
      - ".github/workflows/backend-ci.yml"
      - "pyproject.toml"

jobs:
  quality:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: sinarm-office-backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "sinarm-office-backend/requirements/dev.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements/dev.txt -r requirements/prod.txt

      - name: Django check
        run: python manage.py check

      - name: Ruff
        run: python -m ruff check . --no-cache

      - name: Black
        run: python -m black --check .

      - name: Tests
        run: python -m pytest
